name: nexora_app
description: "A new Flutter project for snake identification."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # Icons and Styling
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.9.1

  # Network and API
  dio: ^5.9.1

  # Camera and Photos
  image_picker: ^1.2.1

  # Maps and Location
  google_maps_flutter: ^2.14.0
  location: ^8.0.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2 # Kept here, deleted the one at the bottom

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Asset registration belongs here, indented correctly
  assets:
    - assets/data/snakes.json
    - assets/images/